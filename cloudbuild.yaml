steps:
  # Build backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/papertales-backend",
        "./backend",
      ]

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/papertales-backend"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "papertales-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/papertales-backend"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--timeout"
      - "600"
      - "--set-secrets"
      - "GOOGLE_API_KEY=google-api-key:latest"

  # Build frontend
  - name: "node:20"
    dir: "frontend"
    entrypoint: bash
    args:
      - "-c"
      - "npm ci && npm run build"

  # Deploy frontend to Firebase Hosting
  - name: "node:20"
    entrypoint: bash
    args:
      - "-c"
      - "npm install -g firebase-tools && firebase deploy --only hosting --project=$PROJECT_ID"

images:
  - "gcr.io/$PROJECT_ID/papertales-backend"
